<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | SHOE MAFIA</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="site-nav"></div>
<main class="section" style="padding-top:7rem"><div class="container" style="max-width:560px">
<h1 class="section-title">CHECKOUT</h1>
<form id="checkoutForm" class="glass" style="padding:2rem">
<div class="form-group"><label>Name</label><input id="cName" required></div>
<div class="form-group"><label>Email</label><input type="email" id="cEmail" required></div>
<div class="form-group"><label>Phone</label><input id="cPhone" required></div>
<div class="form-group"><label>Address</label><textarea id="cAddress" required></textarea></div>
<div class="form-group"><label>City</label><input id="cCity" value="Bilaspur" required></div>
<div class="form-group"><label>Pincode</label><input id="cPin" value="495001" required></div>
<div class="form-group"><label>Coupon</label><input id="cCoupon"></div>
<div class="form-group"><label>Payment</label><select id="cPay"><option value="cod">COD</option><option value="razorpay">Razorpay</option></select></div>
<p id="summary"></p>
<button class="btn btn-primary" style="width:100%">Place Order</button>
</form>
</div></main>
<div id="site-footer"></div>
<script src="js/store.js"></script>
<script src="js/common.js"></script>
<script>
SMCommon.renderNav("checkout.html");
var cart = SMCommon.getCart();
if (!cart.length) location.href = "cart.html";
var store = ShoeMafiaStore.loadStore(), subtotal = 0;
cart.forEach(function(i) { var p = store.products.find(function(x) { return x.id === i.productId; }); if (p) subtotal += ShoeMafiaStore.effectivePrice(p) * i.quantity; });
var ship = subtotal > 2999 ? 0 : 99;
document.getElementById("summary").textContent = "Subtotal " + ShoeMafiaStore.formatINR(subtotal) + " + ship " + ShoeMafiaStore.formatINR(ship);
document.getElementById("checkoutForm").onsubmit = function(e) {
  e.preventDefault();
  var items = cart.map(function(i) { var p = store.products.find(function(x) { return x.id === i.productId; }); return { productId: i.productId, size: i.size, quantity: i.quantity, name: p.name, price: ShoeMafiaStore.effectivePrice(p), image: p.images[0]||"" }; });
  var disc = 0, code = document.getElementById("cCoupon").value.toUpperCase();
  var c = store.coupons.find(function(x) { return x.code === code; });
  if (code && c) disc = subtotal * c.discountPercent / 100;
  var gst = (subtotal - disc) * ShoeMafiaStore.GST_RATE;
  var total = subtotal - disc + gst + ship;
  try {
    var order = ShoeMafiaStore.createOrder({ customerName: document.getElementById("cName").value, email: document.getElementById("cEmail").value, phone: document.getElementById("cPhone").value, address: document.getElementById("cAddress").value, city: document.getElementById("cCity").value, pincode: document.getElementById("cPin").value, items: items, subtotal: subtotal, discount: disc, gst: gst, shipping: ship, total: total, paymentMethod: document.getElementById("cPay").value, paymentStatus: "pending", status: "pending" });
    SMCommon.setCart([]);
    location.href = "track.html?id=" + order.id;
  } catch (err) { alert(err.message); }
};
</script>
</body>
</html>
